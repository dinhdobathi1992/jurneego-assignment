# ============================================================
# JurneeGo Safe AI Learning Assistant — Docker Compose
# ============================================================
# Quick start:  docker compose up --build
# With LiteLLM: docker compose --profile litellm up --build
# Swagger UI:   http://localhost:8000/docs
# ============================================================

services:
  # ---------- API Service ----------
  api:
    build: .
    container_name: jurnee-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DB host — inside Docker, use service name
      DATABASE_URL: postgresql://jurnee:jurnee_secret@db:5432/jurnee_ai
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jurnee-network

  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    container_name: jurnee-db
    environment:
      POSTGRES_USER: jurnee
      POSTGRES_PASSWORD: jurnee_secret
      POSTGRES_DB: jurnee_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurnee -d jurnee_ai"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - jurnee-network

  # ---------- LiteLLM Proxy (Optional) ----------
  # Only starts with: docker compose --profile litellm up
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: jurnee-litellm
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: sk-local-dev-key
    profiles:
      - litellm
    restart: unless-stopped
    networks:
      - jurnee-network

volumes:
  pgdata:
    driver: local

networks:
  jurnee-network:
    driver: bridge

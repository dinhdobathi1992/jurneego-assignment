<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubbli — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
            inter:   ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3,button { font-family: 'Plus Jakarta Sans', sans-serif; }

    #messages, #conv-list-wrap {
      scrollbar-width: thin;
      scrollbar-color: #DAF0EE transparent;
    }
    #messages::-webkit-scrollbar,
    #conv-list-wrap::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb,
    #conv-list-wrap::-webkit-scrollbar-thumb { background-color: #DAF0EE; border-radius: 9999px; }

    /* Onyx-style action toolbar fade */
    .ai-msg-group .ai-actions { opacity: 0; transition: opacity 150ms ease; }
    .ai-msg-group:hover .ai-actions { opacity: 1; }

    /* Suggestion card hover lift */
    .suggestion-chip { transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1); }
    .suggestion-chip:hover { transform: translateY(-1px); }

    /* Soft pulse for typing dots */
    @keyframes softBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    .dot { animation: softBounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.16s; }
    .dot:nth-child(3) { animation-delay: 0.32s; }

    @media (prefers-reduced-motion: reduce) {
      .animate-pulse, .dot, .suggestion-chip { animation: none; transition: none; }
    }

    /* Hide native textarea resize handle */
    textarea { resize: none; }

    /* AI message — preserve newlines from streaming */
    .ai-content { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body class="h-screen bg-white flex overflow-hidden">

  <!-- ─── Sidebar ─── -->
  <aside class="hidden md:flex w-64 lg:w-72 bg-[#F8FFFE] border-r border-[#DAF0EE] flex-col flex-shrink-0">

    <!-- Brand -->
    <div class="px-4 pt-4 pb-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <img src="./assets/logo.png" alt="Bubbli" class="h-8 w-8 rounded-lg object-contain" />
        <span class="font-jakarta font-extrabold text-[#0A3D3C] text-lg">Bubbli</span>
      </div>
    </div>

    <!-- New Chat -->
    <div class="px-3 pb-2">
      <button id="new-chat-btn"
              class="w-full flex items-center justify-center gap-2 bg-[#EE6742] hover:bg-[#d55630] text-white rounded-2xl px-4 py-3 text-sm font-jakarta font-semibold cursor-pointer transition-all duration-150 shadow-sm hover:shadow-md active:scale-[0.98]">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
        </svg>
        New Chat
      </button>
    </div>

    <!-- Search -->
    <div class="px-3 pb-3">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
             fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input id="conv-search" type="text" placeholder="Search chats…"
               class="w-full bg-white border border-[#DAF0EE] rounded-xl pl-9 pr-3 py-2 text-sm font-inter text-[#0A3D3C] placeholder-gray-400 focus-visible:outline-none focus-visible:border-[#0A3D3C]/50 focus-visible:ring-2 focus-visible:ring-[#0A3D3C]/10 transition-all" />
      </div>
    </div>

    <!-- Conversation list (date-grouped) -->
    <div id="conv-list-wrap" class="flex-1 overflow-y-auto px-2 pb-2"></div>

    <!-- User profile -->
    <div class="border-t border-[#DAF0EE] px-3 py-3 flex items-center gap-2.5 bg-[#F8FFFE]">
      <div class="flex-shrink-0 w-9 h-9 rounded-full bg-[#EE6742] flex items-center justify-center text-white text-sm font-bold font-jakarta shadow-sm">
        <span id="user-avatar">?</span>
      </div>
      <div class="flex-1 min-w-0">
        <p id="user-name" class="text-sm font-semibold font-jakarta text-[#0A3D3C] truncate"></p>
        <p id="user-email" class="text-[11px] text-gray-400 truncate"></p>
      </div>
      <button id="logout-btn" title="Sign out"
              class="flex-shrink-0 text-gray-400 hover:text-[#EE6742] p-2 rounded-lg hover:bg-red-50 cursor-pointer transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
      </button>
    </div>
  </aside>

  <!-- ─── Main area ─── -->
  <main class="flex-1 flex flex-col overflow-hidden bg-white relative">

    <!-- Mobile top bar -->
    <div class="md:hidden flex items-center justify-between px-4 py-3 border-b border-[#DAF0EE] flex-shrink-0">
      <div class="flex items-center gap-2">
        <img src="./assets/logo.png" alt="Bubbli" class="h-7 w-7 rounded-lg object-contain" />
        <span class="font-jakarta font-extrabold text-[#0A3D3C]">Bubbli</span>
      </div>
      <button id="new-chat-btn-mobile" onclick="document.getElementById('new-chat-btn').click()"
              class="flex items-center gap-1.5 bg-[#EE6742] text-white rounded-full px-3 py-1.5 text-xs font-jakarta font-semibold cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        New
      </button>
    </div>

    <!-- ── Welcome state ── -->
    <div id="welcome-state" class="flex-1 flex flex-col items-center justify-center px-6 overflow-y-auto py-10">
      <div class="w-full max-w-2xl mx-auto">
        <div class="flex flex-col items-center mb-8">
          <div class="w-16 h-16 bg-[#DAF0EE] rounded-2xl flex items-center justify-center mb-4 shadow-sm">
            <svg class="w-9 h-9 text-[#0A3D3C]" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
            </svg>
          </div>
          <h1 class="text-3xl md:text-4xl font-extrabold font-jakarta text-[#0A3D3C] mb-2 text-center">
            How can I help, <span id="welcome-name">friend</span>?
          </h1>
          <p class="text-gray-500 text-sm md:text-base text-center">
            Ask me anything — math, science, stories, or just to chat!
          </p>
        </div>

        <!-- Centered input -->
        <div class="bg-white border border-[#DAF0EE] rounded-2xl shadow-sm hover:shadow-md focus-within:shadow-md focus-within:border-[#0A3D3C]/40 transition-all">
          <textarea id="welcome-input"
                    rows="1"
                    placeholder="How can I help you today?"
                    class="w-full bg-transparent text-base font-inter text-[#0A3D3C] placeholder-gray-400 px-4 pt-4 pb-2 focus-visible:outline-none leading-relaxed"
                    style="max-height:200px; border:none; outline:none;"></textarea>
          <div class="flex items-center justify-between px-3 pb-3 pt-1">
            <div class="flex items-center gap-1">
              <button class="text-gray-400 p-2 rounded-lg cursor-not-allowed opacity-60" title="Attachments coming soon" disabled>
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13" />
                </svg>
              </button>
            </div>
            <button id="welcome-send-btn"
                    class="bg-[#0A3D3C] hover:bg-[#072e2d] disabled:opacity-30 disabled:cursor-not-allowed text-white rounded-xl w-9 h-9 flex items-center justify-center cursor-pointer transition-all duration-150 hover:scale-105 active:scale-95 disabled:hover:scale-100">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 19.5v-15m0 0-6.75 6.75M12 4.5l6.75 6.75" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Suggestion chips -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2.5 mt-6">
          <button class="suggestion-chip text-left p-3.5 rounded-xl border border-[#DAF0EE] hover:border-[#0A3D3C]/40 hover:bg-[#F2FBF9] cursor-pointer"
                  data-prompt="Help me with my math homework. Can you explain how to add fractions?">
            <p class="text-sm font-semibold text-[#0A3D3C] font-jakarta flex items-center gap-2">
              <span class="w-6 h-6 rounded-lg bg-[#FFE5DD] flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-[#EE6742]" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m6-6H6"/></svg>
              </span>
              Help with math
            </p>
            <p class="text-xs text-gray-500 mt-1 ml-8">Fractions, multiplication, word problems…</p>
          </button>

          <button class="suggestion-chip text-left p-3.5 rounded-xl border border-[#DAF0EE] hover:border-[#0A3D3C]/40 hover:bg-[#F2FBF9] cursor-pointer"
                  data-prompt="Tell me a fun adventure story about a brave little dragon.">
            <p class="text-sm font-semibold text-[#0A3D3C] font-jakarta flex items-center gap-2">
              <span class="w-6 h-6 rounded-lg bg-[#DAF0EE] flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-[#0A3D3C]" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>
              </span>
              Tell me a story
            </p>
            <p class="text-xs text-gray-500 mt-1 ml-8">A fairy tale, adventure, or fun mystery</p>
          </button>

          <button class="suggestion-chip text-left p-3.5 rounded-xl border border-[#DAF0EE] hover:border-[#0A3D3C]/40 hover:bg-[#F2FBF9] cursor-pointer"
                  data-prompt="Why is the sky blue? Explain it in a fun way.">
            <p class="text-sm font-semibold text-[#0A3D3C] font-jakarta flex items-center gap-2">
              <span class="w-6 h-6 rounded-lg bg-[#E3F2FD] flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-[#3b82f6]" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/></svg>
              </span>
              Explain something
            </p>
            <p class="text-xs text-gray-500 mt-1 ml-8">How things work — science, nature, space</p>
          </button>

          <button class="suggestion-chip text-left p-3.5 rounded-xl border border-[#DAF0EE] hover:border-[#0A3D3C]/40 hover:bg-[#F2FBF9] cursor-pointer"
                  data-prompt="Write a short rhyming poem about a curious little cat.">
            <p class="text-sm font-semibold text-[#0A3D3C] font-jakarta flex items-center gap-2">
              <span class="w-6 h-6 rounded-lg bg-[#FFF7E0] flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-[#D97706]" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"/></svg>
              </span>
              Be creative
            </p>
            <p class="text-xs text-gray-500 mt-1 ml-8">Write a poem, song, or short story</p>
          </button>
        </div>

        <p class="text-center text-[11px] text-gray-400 mt-6">
          Bubbli is safe-filtered for kids • 100 messages/day
        </p>
      </div>
    </div>

    <!-- ── Active chat thread ── -->
    <div id="chat-thread" class="flex-1 overflow-y-auto" style="display:none">
      <div id="messages" class="max-w-3xl mx-auto px-4 md:px-8 py-8"></div>
    </div>

    <!-- ── Bottom input (active chat only) ── -->
    <div id="chat-input-area" class="bg-white px-4 md:px-8 py-4 flex-shrink-0" style="display:none">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white border border-[#DAF0EE] rounded-2xl shadow-sm hover:shadow-md focus-within:shadow-md focus-within:border-[#0A3D3C]/40 transition-all">
          <textarea id="msg-input"
                    rows="1"
                    placeholder="Ask anything…"
                    class="w-full bg-transparent text-[15px] font-inter text-[#0A3D3C] placeholder-gray-400 px-4 pt-3 pb-2 focus-visible:outline-none leading-relaxed"
                    style="max-height:160px; border:none; outline:none;"></textarea>
          <div class="flex items-center justify-between px-3 pb-2 pt-1">
            <div class="flex items-center gap-1">
              <button class="text-gray-400 p-2 rounded-lg cursor-not-allowed opacity-60" title="Attachments coming soon" disabled>
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13" />
                </svg>
              </button>
            </div>
            <button id="send-btn"
                    class="bg-[#0A3D3C] hover:bg-[#072e2d] disabled:opacity-30 disabled:cursor-not-allowed text-white rounded-xl w-9 h-9 flex items-center justify-center cursor-pointer transition-all duration-150 hover:scale-105 active:scale-95 disabled:hover:scale-100">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 19.5v-15m0 0-6.75 6.75M12 4.5l6.75 6.75" />
              </svg>
            </button>
            <button id="stop-btn" type="button"
                    class="hidden flex-shrink-0 w-9 h-9 rounded-full bg-[#EE6742] hover:bg-[#d65a39] text-white flex items-center justify-center cursor-pointer transition-colors" title="Stop" aria-label="Stop generating">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                <rect x="5" y="5" width="10" height="10" rx="1.5"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="text-center text-[11px] text-gray-400 mt-2">
          Bubbli is safe-filtered for kids • 100 messages/day
        </p>
      </div>
    </div>
  </main>

  <!-- Toast (for copy feedback etc.) -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#0A3D3C] text-white text-sm font-medium font-inter px-4 py-2 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-200 z-50">
    Copied
  </div>

  <script type="module">
    import { init } from './js/chatter.js?v=7';
    import { routeByRole } from './js/auth.js';

    const token = sessionStorage.getItem('app_token');
    const role  = sessionStorage.getItem('user_role');

    if (!token) {
      location.href = '/frontend/index.html';
    } else if (role && role !== 'learner') {
      routeByRole(role);
    } else {
      const name = sessionStorage.getItem('display_name') ?? '';
      const avatar = document.getElementById('user-avatar');
      if (avatar && name) avatar.textContent = name[0].toUpperCase();
      const welcomeName = document.getElementById('welcome-name');
      if (welcomeName && name) welcomeName.textContent = name.split(' ').slice(-1)[0] || name;
      init();
    }
  </script>
</body>
</html>

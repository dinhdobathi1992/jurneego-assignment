<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubbli — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
            inter:   ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3,button { font-family: 'Plus Jakarta Sans', sans-serif; }
    #messages {
      scrollbar-width: thin;
      scrollbar-color: #DAF0EE transparent;
    }
    #conv-list {
      scrollbar-width: thin;
      scrollbar-color: #DAF0EE transparent;
    }
    @media (prefers-reduced-motion: reduce) {
      .animate-pulse { animation: none; }
    }
  </style>
</head>
<body class="h-screen bg-[#F2FBF9] flex flex-col overflow-hidden">

  <!-- Top Nav -->
  <header class="bg-[#0A3D3C] px-4 md:px-6 py-3 flex items-center justify-between flex-shrink-0 shadow-md">
    <div class="flex items-center gap-3">
      <img src="./assets/logo.png" alt="Bubbli" class="h-8 object-contain rounded-lg" />
    </div>
    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-[#EE6742] flex items-center justify-center text-white text-xs font-bold">
          <span id="user-avatar">?</span>
        </div>
        <span id="user-name" class="text-[#DAF0EE] text-sm font-medium"></span>
        <span id="user-email" class="text-[#DAF0EE]/60 text-xs"></span>
      </div>
      <button id="logout-btn"
              class="text-[#DAF0EE] hover:text-white text-xs border border-[#DAF0EE]/40 hover:border-[#DAF0EE] rounded-full px-3 py-1.5 cursor-pointer transition-colors duration-150">
        Sign out
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside class="hidden md:flex w-60 bg-white border-r border-[#DAF0EE] flex-col flex-shrink-0">
      <div class="p-3 border-b border-[#DAF0EE]">
        <button id="new-chat-btn"
                class="w-full flex items-center justify-center gap-2 bg-[#EE6742] hover:bg-[#d55630] text-white rounded-full px-4 py-2.5 text-sm font-jakarta font-semibold cursor-pointer transition-colors duration-150 shadow-sm">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          New Chat
        </button>
      </div>
      <div class="flex-1 overflow-y-auto" id="conv-list-wrap">
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-semibold px-4 pt-3 pb-1">Recent</p>
        <ul id="conv-list" class="px-2 pb-2 space-y-0.5"></ul>
      </div>
    </aside>

    <!-- Chat area -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- Mobile new chat bar -->
      <div class="md:hidden flex items-center gap-2 px-4 py-2 bg-white border-b border-[#DAF0EE] flex-shrink-0">
        <button id="new-chat-btn-mobile"
                class="flex items-center gap-1.5 bg-[#EE6742] text-white rounded-full px-3 py-1.5 text-xs font-jakarta font-semibold cursor-pointer"
                onclick="document.getElementById('new-chat-btn').click()">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          New Chat
        </button>
      </div>

      <!-- Messages -->
      <div id="messages" class="flex-1 overflow-y-auto py-6 space-y-0">
        <!-- Empty state shown by default -->
        <div id="chat-empty-state" class="flex flex-col items-center justify-center h-full text-center px-8 select-none">
          <div class="w-16 h-16 bg-[#DAF0EE] rounded-2xl flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-[#0A3D3C]" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
            </svg>
          </div>
          <p class="text-[#0A3D3C] font-jakarta font-semibold text-base">Pick a chat or start a new one</p>
          <p class="text-gray-400 text-sm mt-1">Ask me anything — I'm here to help!</p>
        </div>
      </div>

      <!-- Input bar (hidden until a chat is selected) -->
      <div id="chat-input-area" class="hidden bg-white border-t border-[#DAF0EE] px-4 md:px-8 py-4 flex-shrink-0">
        <div class="flex gap-3 max-w-3xl mx-auto items-end">
          <textarea id="msg-input"
                    rows="1"
                    placeholder="Ask anything…"
                    class="flex-1 resize-none bg-[#F2FBF9] border border-[#DAF0EE] rounded-2xl px-4 py-3 text-sm font-inter text-[#0A3D3C] placeholder-gray-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#0A3D3C]/30 transition-shadow leading-relaxed"
                    style="max-height:120px; overflow-y:auto;"></textarea>
          <button id="send-btn"
                  class="flex-shrink-0 bg-[#0A3D3C] hover:bg-[#072e2d] disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-2xl px-5 py-3 font-jakarta font-semibold text-sm cursor-pointer transition-colors duration-150 flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
            Send
          </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2">
          Bubbli is safe-filtered for kids &bull; 100 messages/day
        </p>
      </div>

    </main>
  </div>

  <script type="module">
    import { init } from './js/chatter.js';
    import { routeByRole } from './js/auth.js';

    const token = sessionStorage.getItem('app_token');
    const role  = sessionStorage.getItem('user_role');

    if (!token) {
      location.href = '/frontend/index.html';
    } else if (role && role !== 'learner') {
      routeByRole(role);
    } else {
      // Set avatar initial
      const name = sessionStorage.getItem('display_name') ?? '';
      const avatar = document.getElementById('user-avatar');
      if (avatar && name) avatar.textContent = name[0].toUpperCase();
      init();
    }
  </script>
</body>
</html>

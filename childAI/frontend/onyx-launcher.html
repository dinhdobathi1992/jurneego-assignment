<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading Onyx UI…</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="h-screen bg-[#F2FBF9] flex items-center justify-center">
  <div class="text-center max-w-md px-6">
    <div class="w-14 h-14 bg-[#DAF0EE] rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-[#0A3D3C] animate-spin" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
    </div>
    <h1 class="font-extrabold text-[#0A3D3C] text-xl mb-2">Loading Onyx UI…</h1>
    <p id="status" class="text-gray-500 text-sm">Bridging your session…</p>
    <p id="error" class="hidden text-[#EE6742] text-sm mt-3"></p>
    <button id="back-btn" class="hidden mt-4 text-sm font-semibold text-[#0A3D3C] underline cursor-pointer">Go back</button>
  </div>

  <script>
    (function () {
      const ONYX_URL = 'http://localhost:3002/app';
      const status   = document.getElementById('status');
      const errorEl  = document.getElementById('error');
      const backBtn  = document.getElementById('back-btn');

      const token = sessionStorage.getItem('app_token');
      if (!token) {
        errorEl.textContent = 'Not signed in. Please sign in first.';
        errorEl.classList.remove('hidden');
        backBtn.classList.remove('hidden');
        backBtn.onclick = () => { location.href = '/frontend/index.html'; };
        return;
      }

      // Drop the JWT into a cookie that the Onyx Next.js proxy can read.
      // Path=/ so it covers /api/* on port 3002.
      // Max-Age 8h ~ a typical session length.
      document.cookie = `app_token=${token}; path=/; max-age=28800; SameSite=Lax`;

      status.textContent = 'Redirecting…';
      // Small delay so the cookie is committed before navigation.
      setTimeout(() => { location.href = ONYX_URL; }, 250);
    })();
  </script>
</body>
</html>

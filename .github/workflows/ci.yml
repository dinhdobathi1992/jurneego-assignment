# ============================================================
# JurneeGo Safe AI Learning Assistant — CI Pipeline
# ============================================================
# Runs on every push and PR:
#   1. Lint (ruff check)
#   2. Format check (ruff format --check)
#   3. Tests (pytest with PostgreSQL service)
#   4. Docker build (verify image builds)
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------- Lint & Format ----------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Run linter
        run: ruff check app/ tests/

      - name: Check formatting
        run: ruff format --check app/ tests/

  # ---------- Tests ----------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: test_jurnee
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test_secret@localhost:5432/test_jurnee
      AI_PROVIDER: mock
      SAFETY_ENABLED: "true"
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---------- Docker Build ----------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jurnee-safe-ai:test .

      - name: Verify health check
        run: |
          docker run -d --name test-api \
            -e DATABASE_URL=sqlite:///test.db \
            -e AI_PROVIDER=mock \
            -p 8000:8000 \
            jurnee-safe-ai:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
